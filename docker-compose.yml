services:
  postgres:
    image: postgres:16-alpine
    container_name: ayudandonos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ayudandonos
      POSTGRES_PASSWORD: ayudandonos_dev
      POSTGRES_DB: ayudandonos
    ports:
      - '5432:5432'
    volumes:
      - ayudandonos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ayudandonos -d ayudandonos']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ayudandonos_pg_data:
